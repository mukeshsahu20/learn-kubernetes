apiVersion: v1
kind: Pod
metadata:
  name: nginx
spec:
  containers:
    - name: nginx
      image: nginx
      volumeMounts:
        - mountPath: /usr/bin
          name: html
    - name: debug
      image: docker.io/rkalluru/learnk8s:rhel9-bare
      volumeMounts:
          - mountPath: /mnt
            name: html

  volumes:
    - name: html
      emptyDir: {}