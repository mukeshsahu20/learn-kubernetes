apiVersion: v1
kind: Secret
metadata:
  name: sample-secret
data:
  DEMO_GREETING: aGVsbG8gdGhpcyBteSBwYXNzd29yZAo=

---
apiVersion: v1
kind: Pod
metadata:
  name: envar-demo-secret
  labels:
    purpose: demonstrate-envars
spec:
  containers:
    - name: demo
      image: docker.io/rkalluru/learnk8s:rhel9-bare
      env:
        - name: DEMO_GREETING
          valueFrom:
            secretKeyRef:
              name: sample-secret
              key: DEMO_GREETING
---
apiVersion: v1
kind: Pod
metadata:
  name: env-from-demo-secret
  labels:
    purpose: demonstrate-envars
spec:
  containers:
    - name: demo
      image: docker.io/rkalluru/learnk8s:rhel9-bare
      envFrom:
        - secretKeyRef:
            name: sample-secret

